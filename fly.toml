# fly.toml app configuration file generated for xs-bingo on 2026-04-11T11:02:10+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'xs-bingo'
primary_region = 'sin'

[http_service]
  [env]
PORT = "8080"

[[services]]
internal_port = 8080
protocol = "tcp"
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
