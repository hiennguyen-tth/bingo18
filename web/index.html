  <!-- React 18 UMD — production build (4× smaller than dev) -->

  <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin />

  <!-- No Babel Standalone needed — JSX is pre-compiled at build time (npm run build) -->

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    code {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.85em;
      background: rgba(99, 102, 241, 0.15);
      padding: 2px 6px;
      border-radius: 4px;
    }

    #app {
      min-height: 100vh;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive helpers ── */
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .grid-overdue {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .hide-mobile {}

    @media (max-width: 640px) {
      .grid2 {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .grid3 {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .grid-overdue {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .hide-mobile {
        display: none !important;
      }

      .header-actions {
        gap: 6px;
      }

      /* Tighten cards on mobile */
      table {
        font-size: 12px;
      }

      td,
      th {
        padding: 6px 8px !important;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6366f1;font-size:18px">

    </div>
  </div>

  <!--
    heatmap.js and app.js are pre-compiled from JSX at build time (npm run build).

  <script src="app.js?v=20260419"></script>
</body>
